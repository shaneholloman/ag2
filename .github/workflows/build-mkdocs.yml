name: Build MkDocs

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: true
        default: '3.10'
        type: string
      deploy:
        description: 'Whether to publish the built docs to the gh-pages branch'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
      - name: setup python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ github.event.inputs.python-version }}

      - name: Install quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2.2.0

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - name: Build MkDocs documentation
        run: |
          uv venv
          . .venv/bin/activate
          uv pip install --group docs -e .
          just docs-build --force
        working-directory: .

      - name: Verify the build
        run: |
          ls -la ./website/mkdocs/site
          # Ensure the llms.txt files were generated and copied into the site.
          for f in llms.txt llms-full.txt; do
            if [ ! -s "./website/mkdocs/site/$f" ]; then
              echo "::error::Expected non-empty ./website/mkdocs/site/$f (llms.txt generation failed)"
              exit 1
            fi
          done
        working-directory: .

      - name: Publish docs to GH Pages
        if: ${{ inputs.deploy }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Documentation versioning was removed: publish the freshly built site at
          # the gh-pages root. A separate worktree keeps the build output untouched.
          # Existing gh-pages content (e.g. archived version directories, CNAME,
          # .nojekyll) is left in place — only the root documentation is refreshed.
          git worktree add gh-pages-publish gh-pages
          cp -r website/mkdocs/site/. gh-pages-publish/

          cd gh-pages-publish
          git add -A
          git commit -m "docs: deploy docs" || echo "No documentation changes to deploy"
          git push origin gh-pages
