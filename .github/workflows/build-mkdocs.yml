name: Build MkDocs

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: true
        default: '3.10'
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
      - name: setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ github.event.inputs.python-version }}

      - name: Install quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2.2.0

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - name: Build MkDocs documentation
        run: |
          uv venv
          . .venv/bin/activate
          uv pip install -e ".[docs]"
          just docs-build --force
        working-directory: .

      - name: Verify the build
        run: |
          ls -la ./website/mkdocs/site
          # Ensure the Beta-scoped llms.txt files were generated and copied into the site.
          for f in llms.txt llms-full.txt; do
            if [ ! -s "./website/mkdocs/site/$f" ]; then
              echo "::error::Expected non-empty ./website/mkdocs/site/$f (llms.txt generation failed)"
              exit 1
            fi
          done
        working-directory: .

      - name: Configure Git user
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Build docs and squash gh-pages commits
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/0.9'
        run: |
          . .venv/bin/activate

          # Get version directly from the package
          VERSION=$(python -c 'import os, sys; sys.path.insert(0, os.getcwd()); import autogen; print(".".join(autogen.__version__.split(".")[:3]))')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # Check if version contains "rc"
          IS_RC=$(python -c 'import os, sys, re; sys.path.insert(0, os.getcwd()); import autogen; version = autogen.__version__; print(not bool(re.match(r"^[0-9]+(\.[0-9]+)*$", version)))')
          echo "IS_RC=$IS_RC" >> $GITHUB_ENV

          echo $VERSION
          echo $IS_RC

          # mike commits the built site locally; the force-push step below squashes it.
          if [ "$IS_RC" == "False" ] || [ "$VERSION" == "0.9.1post0" ]; then
            cd website/mkdocs
            mike deploy -F mkdocs.yml --update-aliases $VERSION latest
            mike set-default --allow-empty -F mkdocs.yml latest
          else
            cd website/mkdocs
            mike deploy -F mkdocs.yml --update-aliases $VERSION
          fi

          # Collapse mike's commits into one staged change on top of published gh-pages.
          git checkout gh-pages
          git reset --soft origin/gh-pages

      - name: Force-push squashed docs to GH Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/0.9'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          branch: gh-pages
          push_options: "--force"  # force push to keep gh-pages history clear
          commit_message: "docs: deploy docs"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
