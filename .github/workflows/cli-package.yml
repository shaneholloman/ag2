# Builds and uploads ag2-cli to PyPI when a release tagged cli-v* is published
# Manual dispatch also supported for testing

name: cli-package

on:
  release:
    types: [published]
  workflow_dispatch: null

permissions: {}

jobs:
  deploy:
    # Only run for CLI releases (tag starts with cli-v) or manual dispatch
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'cli-v')
    runs-on: ubuntu-latest
    environment: package
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Build ag2-cli
        working-directory: cli
        run: |
          uv pip install --system twine
          uv build
      - name: Publish ag2-cli to PyPI
        working-directory: cli
        env:
          TWINE_USERNAME: ${{ secrets.AUTOGEN_PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.AUTOGEN_PYPI_PASSWORD }}
        run: twine upload dist/*
